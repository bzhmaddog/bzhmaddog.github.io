<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>bzhmaddog</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex flex-column min-vh-100">

	<main class="container my-auto py-5">
		<div class="text-center mb-4">
			<img src="https://github.com/bzhmaddog.png" alt="bzhmaddog" width="96" height="96" class="rounded-circle shadow-sm">
		</div>
		<h1 class="text-center mb-5 fw-bold">bzhmaddog</h1>
		<div class="row row-cols-1 row-cols-md-3 g-4 justify-content-center">

			<div class="col">
				<div class="card h-100 shadow-sm">
					<div class="card-img-top d-flex align-items-center justify-content-center bg-primary-subtle py-4">
						<i class="bi bi-file-person fs-1 text-primary"></i>
					</div>
					<div class="card-body d-flex flex-column">
						<h5 class="card-title">Resume</h5>
						<p class="card-text text-muted flex-grow-1">Cédric Martin — Fullstack Web Developer</p>
						<a href="resume/" class="btn btn-primary mt-3" target="_blank" rel="noopener">View Resume</a>
					</div>
				</div>
			</div>

			<div class="col">
				<div class="card h-100 shadow-sm">
					<div class="card-img-top d-flex align-items-center justify-content-center bg-success-subtle py-4">
						<i class="bi bi-display fs-1 text-success"></i>
					</div>
					<div class="card-body d-flex flex-column">
						<h5 class="card-title">H5DMD</h5>
						<p class="card-text text-muted flex-grow-1">HTML5 Dot Matrix Display</p>
						<a href="/H5DMD/" class="btn btn-success mt-3" target="_blank" rel="noopener">Open</a>
					</div>
				</div>
			</div>

			<div class="col">
				<div class="card h-100 shadow-sm">
					<div class="card-img-top d-flex align-items-center justify-content-center bg-warning-subtle py-4">
						<i class="bi bi-book fs-1 text-warning"></i>
					</div>
					<div class="card-body d-flex flex-column">
						<h5 class="card-title">H5DMD Docs</h5>
						<p class="card-text text-muted flex-grow-1">Documentation for the HTML5 Dot Matrix Display library</p>
						<a href="/H5DMD/docs/" class="btn btn-outline-warning mt-3" target="_blank" rel="noopener">Open Docs</a>
					</div>
				</div>
			</div>

		</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
